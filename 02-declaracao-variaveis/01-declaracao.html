<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatble" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Minha Pagina</h1>
    <script>

        // Usando 'let' para declarar e inicializar uma variável
       let nome ="Pedro";

       let idade;
       idade = 18;

       //Declarando uma constante
       const pi = 3.14;

       //Demonstrar em HTML
       document.write("<h3>Olá, " + nome + ", seja bem-vindo!</h3>");

       document.write("<br> Idade: " + idade);

       document.write("<br> Pi: " + pi);

    </script>
</body>
</html>
